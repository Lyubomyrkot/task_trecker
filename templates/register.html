{% extends 'base.html' %}

{% block title %}Register{% endblock %}

{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                             style="width:70px;height:70px;background:#6C63FF;color:white;font-size:28px;">
                            👤
                        </div>
                        <h2 class="fw-bold">Create Account</h2>
                        <p class="text-muted">
                            Join TaskTracker and start organizing your work.
                        </p>
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Username
                            </label>
                            {{ form.username }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Email
                            </label>
                            {{ form.email }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Password
                            </label>
                            {{ form.password1 }}
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Confirm Password
                            </label>
                            {{ form.password2 }}
                        </div>
                        <button class="btn text-white w-100 py-2"
                                style="background:#6C63FF;">
                            Create Account
                        </button>
                    </form>
                    <hr class="my-4">
                    <p class="text-center text-muted mb-0">
                        Already have an account?
                        <a href="{% url 'login' %}"
                           class="text-decoration-none fw-semibold"
                           style="color:#6C63FF;">

                            Login
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
